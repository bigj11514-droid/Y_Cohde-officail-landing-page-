<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Y_Cohde | Contemporary Software Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#home">
          <span class="brand-mark">Y</span>
          <span class="brand-text">_Cohde</span>
        </a>

      <main>
        <section class="hero" id="home">
          <div class="hero-background"></div>

            <div class="hero-copy">
              <span class="eyebrow">Y_Cohde</span>
              <h1>Minimal digital experiences with premium polish.</h1>
              <p>
                Clean interfaces, thoughtful motion, and fast implementation for
                modern brands.
              </p>
              <div class="hero-actions">
                <a
                  class="button button-primary"
                  href="https://bigj11514-droid.github.io/Y_Cohde-website/"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Start a project</a
                >
              </div>
            </div>
          </div>
        </section>

        <section class="section contact" id="contact">
          <div class="contact-panel simple-contact">
            <div>
              <p class="eyebrow">Let’s talk</p>
              <h2>Build a better first impression online.</h2>
            </div>
            <a
              class="button button-primary"
              href="https://wa.me/0207918169"
              target="_blank"
              rel="noopener noreferrer"
              >Message on WhatsApp</a
            >
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
